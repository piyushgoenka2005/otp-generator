services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      OTP_DB_PATH: /app/backend/data/otp.db
      OTP_WEBHOOK_SECRET: dev-webhook-secret
      OTP_DEFAULT_SENDER_ID: GV-TECH
      OTP_USE_REDIS: "false"
    volumes:
      - ./backend/data:/app/backend/data
